services:
  # Base de datos PostgreSQL
  # NOTA: Si el puerto 5432 ya está en uso, cámbialo aquí (ej: "5433:5432")
  db:
    image: postgres:16-alpine
    container_name: cacaoscan_db
    # env_file:
    #   - db/.env  # Opcional: crear db/.env si necesitas variables personalizadas
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cacaoscan_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cacaoscan_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cacaoscan_network

  # Redis para Celery y Channels
  # NOTA: Si el puerto 6379 ya está en uso, cámbialo aquí (ej: "6380:6379")
  redis:
    image: redis:7-alpine
    container_name: cacaoscan_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cacaoscan_network

  # Backend Django
  # NOTA: Si el puerto 8000 ya está en uso, cámbialo aquí (ej: "8001:8000")
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cacaoscan_backend
    # env_file:
    #   - backend/.env  # Opcional: crear backend/.env si necesitas variables personalizadas
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-cacaoscan_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      USE_REDIS: ${USE_REDIS:-True}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # Optimizaciones para evitar problemas de memoria con pkg_resources
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      PYTHONHASHSEED: random
      PKG_RESOURCES_CACHE_DIR: /tmp/pkg_resources_cache
    volumes:
      # Montar código para desarrollo
      # NOTA: Comentado para evitar problemas de memoria con pkg_resources
      # Si necesitas cambios en tiempo real, descomenta pero ten en cuenta que puede causar errores de memoria
      # - ./backend:/app
      # Excluir directorios problemáticos del volumen
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cacaoscan_network
    command: python -m gunicorn cacaoscan.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cacaoscan_celery_worker
    # env_file:
    #   - celery/.env  # Opcional: crear celery/.env si necesitas variables personalizadas
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-cacaoscan_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      USE_REDIS: ${USE_REDIS:-True}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # Optimizaciones para evitar problemas de memoria con pkg_resources
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      PYTHONHASHSEED: random
      PKG_RESOURCES_CACHE_DIR: /tmp/pkg_resources_cache
    volumes:
      # Montar código para desarrollo
      # NOTA: Comentado para evitar problemas de memoria con pkg_resources
      # Si necesitas cambios en tiempo real, descomenta pero ten en cuenta que puede causar errores de memoria
      # - ./backend:/app
      # Excluir directorios problemáticos del volumen
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - cacaoscan_network
    command: celery -A cacaoscan worker --loglevel=info --concurrency=4

  # Celery Beat (scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cacaoscan_celery_beat
    # env_file:
    #   - celery/.env  # Opcional: crear celery/.env si necesitas variables personalizadas
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-cacaoscan_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      USE_REDIS: ${USE_REDIS:-True}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # Optimizaciones para evitar problemas de memoria con pkg_resources
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      PYTHONHASHSEED: random
      PKG_RESOURCES_CACHE_DIR: /tmp/pkg_resources_cache
    volumes:
      # Montar código para desarrollo
      # NOTA: Comentado para evitar problemas de memoria con pkg_resources
      # Si necesitas cambios en tiempo real, descomenta pero ten en cuenta que puede causar errores de memoria
      # - ./backend:/app
      # Excluir directorios problemáticos del volumen
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - cacaoscan_network
    command: celery -A cacaoscan beat --loglevel=info

  # Frontend Vue/Vite
  # NOTA: Si el puerto 5173 ya está en uso, cámbialo aquí (ej: "5174:80")
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://backend:8000/api/v1
    container_name: cacaoscan_frontend
    # env_file:
    #   - frontend/.env  # Opcional: crear frontend/.env si necesitas variables personalizadas
    environment:
      VITE_API_BASE_URL: http://backend:8000/api/v1
    ports:
      - "5173:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - cacaoscan_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_static:
    driver: local
  backend_media:
    driver: local

networks:
  cacaoscan_network:
    driver: bridge
