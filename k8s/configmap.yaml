apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: app-namespace
data:
  DB_HOST: "db-service"
  DB_PORT: "5432"
  DEBUG: "False"
  ALLOWED_HOSTS: "localhost,127.0.0.1,backend-service"
  USE_REDIS: "True"
  CELERY_BROKER_URL: "redis://redis-service:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis-service:6379/0"
  FRONTEND_URL: "http://frontend-service"
  CORS_ALLOWED_ORIGINS: "http://frontend-service,http://localhost:5173"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: app-namespace
data:
  VITE_API_BASE_URL: "http://backend-service:8000/api/v1"

