version: "1"

databases:
  - name: cacaoscan-db
    plan: free
    databaseName: cacaoscan_db
    user: cacaoscan_user

services:

  # --- Backend Django ---
  - type: web
    name: cacaoscan-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: standard
    healthCheckPath: /health
    envVars:
      # Backend base
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: cacaoscan-backend.onrender.com

      # Database
      - key: DB_NAME
        fromDatabase:
          name: cacaoscan-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: cacaoscan-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cacaoscan-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: cacaoscan-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cacaoscan-db
          property: port

      # Frontend URL injection
      - key: FRONTEND_URL
        fromService:
          type: web
          name: cacaoscan-frontend
          property: host
          format: https://${host}

      - key: CORS_ALLOWED_ORIGINS
        value: https://cacaoscan-frontend.onrender.com

      # Startup flags
      - key: SERVICE_ROLE
        value: "web"
      - key: SEED_INITIAL_DATA
        value: "true"
      
      # Superuser creation (secure, via environment variables)
      # Set DJANGO_CREATE_SUPERUSER=true to enable automatic superuser creation
      - key: DJANGO_CREATE_SUPERUSER
        value: "true"
      # IMPORTANT: Set these in Render Dashboard > Environment Variables (not in this file for security)
      # - DJANGO_SUPERUSER_USERNAME: Your desired username
      # - DJANGO_SUPERUSER_EMAIL: Your desired email
      # - DJANGO_SUPERUSER_PASSWORD: Your secure password (min 8 characters)

  # --- Frontend Vue ---
  - type: web
    name: cacaoscan-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: starter
    envVars:
      # Usar fromService para mejor práctica (Render maneja las referencias automáticamente)
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: cacaoscan-backend
          property: host
          format: https://${host}/api/v1
      # Variable adicional para runtime injection (fallback)
      - key: RUNTIME_API_BASE_URL
        fromService:
          type: web
          name: cacaoscan-backend
          property: host
          format: https://${host}/api/v1

