[pytest]
# -------------------------------------------------------
# CONFIGURACIÓN BASE DJANGO
# -------------------------------------------------------
DJANGO_SETTINGS_MODULE = cacaoscan.settings

# Patrones de archivos de test reconocidos por pytest
python_files = tests.py test_*.py *_tests.py

# -------------------------------------------------------
# OPCIONES IMPORTANTES
# -------------------------------------------------------
# --reuse-db: reutiliza la DB de pruebas (mucho más rápido)
# --import-mode=importlib: evita colisiones entre archivos
#                          con el mismo nombre (TEST CRITICAL FIX)
addopts = --reuse-db --import-mode=importlib

# Forzar el import mode moderno (más estable)
import_mode = importlib

# -------------------------------------------------------
# FILTRO DE ADVERTENCIAS
# -------------------------------------------------------
filterwarnings =
    ignore::DeprecationWarning:pkg_resources
    ignore::DeprecationWarning:importlib._bootstrap
    ignore::DeprecationWarning:reportlab
    ignore::DeprecationWarning:django.db.models.constraints
    ignore::UserWarning:django.core.handlers.base

    # Suprimir advertencias de Django 6.0 sobre CheckConstraint.check en migraciones antiguas
    ignore:CheckConstraint.check is deprecated.*:DeprecationWarning
    ignore:.*RemovedInDjango60Warning.*:DeprecationWarning
